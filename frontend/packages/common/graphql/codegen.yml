hooks:
  afterOneFileWrite:
    - prettier --write
config:
  strict: true
  maybeValue: T | null
  declarationKind: interface
  avoidOptionals:
    field: true
    inputValue: false
    object: false
    defaultValue: false
  preResolveTypes: true
  namingConvention:
    enumValues: keep
  scalars:
    DateTime: string
    Date: string
    Decimal: number
    UUID: string
    ID: string
    JSON: Record<string, string>
    Upload: File
    SafeInt: number
overwrite: true
# schema path removed for selfhosted — generated code maintained directly
schema: []
documents: ./src/**/*.gql
generates:
  ./src/schema.ts:
    plugins:
      - typescript
      - typescript-operations
      - ./export-gql-plugin.cjs:
          output: ./src/graphql/index.ts
